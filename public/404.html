<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重定向中...</title>
  <script>
    // GitHub Pages SPA 重定向解决方案
    // 将 404 请求重定向到 index.html，保留路径信息
    (function() {
      var pathSegmentsToKeep = 1; // 保留 /FinanceTools/ 部分
      var l = window.location;
      
      // 将当前路径保存到 sessionStorage
      sessionStorage.redirect = l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1) +
        l.pathname.substring(l.pathname.lastIndexOf('/') + 1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
      
      // 重定向到根路径
      l.replace(l.origin + l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/'));
    })();
  </script>
</head>
<body>
  <div style="text-align: center; padding: 50px; font-family: sans-serif;">
    <h2>正在跳转...</h2>
    <p>如果页面没有自动跳转，请点击 <a href="/FinanceTools/">这里</a> 返回首页</p>
  </div>
</body>
</html>
